name: Build TDengine Windows
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Create build dir
        run: mkdir build

      - name: CMake generate VS2022 solution
        run: |
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
        working-directory: build

      - name: Build with MSBuild
        run: msbuild TDengine.sln /p:Configuration=Release /m
        working-directory: build

      - name: Show binaries
        run: dir bin
        working-directory: build

      - uses: actions/upload-artifact@v4
        with:
          name: tdengine-windows-x64
          path: build/bin/
