name: Build TDengine Windows

on:
  workflow_dispatch: # 手动触发构建

jobs:
  windows-build:
    runs-on: windows-2022 # 官方 Windows 虚拟机，预装 VS 2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake
        uses: ilammy/msvc-dev-cmd@v1 # 自动加载 MSVC 环境

      - name: Create build directory
        run: mkdir build && cd build && cmake .. -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build TDengine
        run: cd build && nmake -j4

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tdengine-windows-bin
          path: build/bin/ # 上传编译产物（taosd.exe、taos.exe 等）
