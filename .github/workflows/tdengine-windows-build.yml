name: Build TDengine Windows (Final Working Version)

on:
  workflow_dispatch: # 手动触发

env:
  # 强制 Node.js 24，消除弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_RUNNER_FORCE_NODE_VERSION: node24

jobs:
  windows-build:
    runs-on: windows-2022
    timeout-minutes: 40 # 延长超时，单线程编译稍慢
    steps:
      # 1. 拉取源码
      - name: Checkout TDengine source
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      # 2. 加载 MSVC 环境（固定 cmd shell，避免PowerShell解析问题）
      - name: Load MSVC 2022 Environment
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\BuildTools\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          echo MSVC environment loaded successfully

      # 3. 安装 CMake（确保版本足够）
      - name: Install CMake
        shell: cmd
        run: |
          powershell -Command "Invoke-WebRequest -Uri 'https://github.com/Kitware/CMake/releases/download/v3.30.1/cmake-3.30.1-windows-x86_64.msi' -OutFile cmake.msi"
          msiexec /i cmake.msi /qn ADD_CMAKE_TO_PATH=System
          cmake --version

      # 4. CMake 配置（仅生成 NMAKE 兼容文件）
      - name: Configure CMake
        shell: cmd
        run: |
          if not exist build mkdir build
          cd build
          cmake .. -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release

      # 5. 核心修复：仅执行 nmake，无任何参数
      - name: Build TDengine with NMAKE (no -j)
        shell: cmd
        run: |
          cd build
          nmake  # 彻底移除 -j 参数，NMAKE 默认单线程编译

      # 6. 验证编译结果
      - name: Verify Build Result
        shell: cmd
        run: |
          cd build\bin
          taos.exe --version

      # 7. 上传产物
      - name: Upload Windows Binaries
        uses: actions/upload-artifact@v4.4.3
        with:
          name: tdengine-windows-x64-final
          path: build/bin/
          retention-days: 7
