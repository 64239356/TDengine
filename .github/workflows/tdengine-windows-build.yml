name: Build TDengine Windows (Node.js 24)

on:
  workflow_dispatch: # 手动触发

# 全局环境变量：强制 Node.js 24，消除弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_RUNNER_FORCE_NODE_VERSION: node24

jobs:
  windows-build:
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      # 1. 拉取源码
      - name: Checkout TDengine source
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      # 2. 原生加载 MSVC 2022 环境
      - name: Load MSVC 2022 Environment
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\BuildTools\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          echo MSVC environment loaded successfully

      # 3. 安装最新 CMake
      - name: Install CMake
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/Kitware/CMake/releases/download/v3.30.1/cmake-3.30.1-windows-x86_64.msi" -OutFile cmake.msi
          msiexec /i cmake.msi /qn ADD_CMAKE_TO_PATH=System
          cmake --version

      # 4. CMake 配置（关键：生成 NMAKE 兼容的 Makefile）
      - name: Configure with CMake
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake .. -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release

      # 5. 编译 TDengine（核心修复：移除 -j 参数，仅用 nmake）
      - name: Build TDengine (NMAKE without -j)
        shell: cmd
        run: |
          cd build
          nmake  # 直接运行 nmake，无任何参数，单线程编译

      # 6. 验证编译结果
      - name: Verify Build
        shell: cmd
        run: |
          cd build\bin
          taos.exe --version

      # 7. 上传产物
      - name: Upload Windows Binaries
        uses: actions/upload-artifact@v4.4.3
        with:
          name: tdengine-windows-x64
          path: build/bin/
          retention-days: 7
